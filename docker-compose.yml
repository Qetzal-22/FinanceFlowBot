services:
  db:
    image: postgres:16
    container_name: finance_flow_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U finance_flow_user -d finance_flow_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  init_db:
    build: .
    command: python scripts/init_db.py
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

  api:
    build: .
    container_name: finance_flow_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      init_db:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: always

  bot:
    build: .
    container_name: finance_flow_bot
    command: python scripts/bot.py
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      init_db:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: always
