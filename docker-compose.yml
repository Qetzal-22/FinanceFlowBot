services:
  db:
    image: postgres:16
    container_name: finance_flow_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    container_name: finance_flow_api
    command: python scripts/api.py
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: always

  bot:
    build: .
    container_name: finance_flow_bot
    command: python scripts/bot.py
    volumes:
      - ./:/app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: always
