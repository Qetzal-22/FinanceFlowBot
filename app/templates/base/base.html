<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block title %}{% endblock %}
</head>
<body class="bg-black text-light d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            💰 FinanceFlow
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Главная</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/admin' %}active{% endif %}" href="/admin">Админ</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/Info' %}active{% endif %}" href="/Info">Инфо</a>
                </li>

            </ul>
            <div class="d-flex ms-3">
                <a href="/login" class="btn btn-outline-light btn-sm">Войти</a>
            </div>
        </div>

    </div>
</nav>

<main class="container-fluid flex-grow-1">
    {% block content %}{% endblock %}
</main>


<footer class="bg-dark text-secondary border-top border-secondary">
    <div class="container py-4 d-flex justify-content-between align-items-center">

        <div>
            <span class="fw-bold text-light">FinanceFlowBot</span><br>
            <small>© 2026 Все права защищены</small>
        </div>

        <div>
            <a href="https://t.me/Qetzal22" class="text-decoration-none text-light me-3">
                <i class="bi bi-telegram"></i>
            </a>

            <a href="https://github.com/Qetzal-22" class="text-decoration-none text-light">
                <i class="bi bi-github"></i>
            </a>
        </div>

    </div>
</footer>
</body>
</html>
